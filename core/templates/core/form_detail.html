{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ form.title }}</title>
  <link rel="stylesheet" href="{% static 'core/core.css' %}">
</head>
<body>
  <div class="form-card">
    {% if access_denied %}
      <h1>Access denied</h1>
    {% else %}
    <h1>{{ form.title }}</h1>

    <form method="post" novalidate id="main-form">
      {% csrf_token %}

      {% for question in questions %}
      <div class="question-block">
        <label for="question_{{ question.id }}">
          {{ question.label }}
          {% if question.is_required %}<span class="required-star" aria-hidden="true">*</span>{% endif %}
        </label>

        {% if question.question_type == "textarea" %}
          <textarea
            id="question_{{ question.id }}"
            name="question_{{ question.id }}"
            {% if question.is_required %}data-required="true"{% endif %}
            aria-describedby="error_{{ question.id }}"
          >{{ submitted_data|default:'' }}</textarea>
        {% else %}
          <input
            type="{% if question.question_type == 'phone_number' %}text{% else %}{{ question.question_type }}{% endif %}"
            id="question_{{ question.id }}"
            name="question_{{ question.id }}"
            value="{{ submitted_data|default:'' }}"
            data-type="{{ question.question_type }}"
            {% if question.is_required %}data-required="true"{% endif %}
            aria-describedby="error_{{ question.id }}"
          />
        {% endif %}

        <span
          class="error-message"
          id="error_{{ question.id }}"
          role="alert"
          aria-live="polite"
        ></span>
      </div>
      {% endfor %}

      <button type="submit" class="submit-btn">Submit</button>
    </form>
    {% endif %}
  </div>

  <script src="{% static 'core/js/validation.js' %}"></script>
  <script>
    document.addEventListener("DOMContentLoaded", initRequiredFieldValidation);
  </script>
</body>
</html>
